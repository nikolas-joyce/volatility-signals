name: Daily Alpha Signals

on:
  push:
    paths:
      - '.github/workflows/daily_signals.yml'
  schedule:
    - cron: '0 22 * * 1-5'   # 22:00 UTC = ~6pm ET, weekdays
  workflow_dispatch:

jobs:
  generate-signals:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install --quiet yfinance pandas numpy matplotlib papermill jupyter ipykernel
          python -m ipykernel install --user

      - name: Run notebook
        run: |
          mkdir -p outputs
          papermill notebooks/alpha_volatility_breakout.ipynb /tmp/alpha_volatility_breakout_run.ipynb --no-progress-bar

      - name: Commit signals
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add outputs/signals_latest.csv
          git diff --cached --quiet && echo "No new signals" || (\
            git commit -m "signals: $(date -u +%Y-%m-%d)" && git push)
